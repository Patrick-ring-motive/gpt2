<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>gpt2</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <script>
    ReadableStream.prototype[Symbol.asyncIterator] ??=
    async function* asyncIterator() {
      const reader = this?.getReader?.();
      try {
        let chunk = await reader.read();
        while (chunk?.done === false) {
          yield chunk?.value;
          chunk = await reader?.read?.();
        }
      } finally {
        reader?.releaseLock?.();
      }
    };
    
  </script>
</head>

<body>
  <input type="text" id="input"></input><button>Send</button>
  <output></output>
  <script  type="module">

    self.log = (e) => {
      if (/error/i.test(e?.constructor?.name)) {
        console.warn(e);
      } else {
        console.log(e);
      }
      (
        document.querySelector("output") ??
        document.getElementsByTagName("output")?.[0] ??
        {}
      ).innerHTML += (" " + (e.message ?? e));
    };
    window.addEventListener("error", function(e) {
      log(e?.message);
      [...arguments].forEach((x) => {
        log("window error " + (x?.message ?? x));
      });
    });
    const gpt2 = new Worker("./distilgpt2/distilgpt2.js");

    gpt2.ready = new Promise((resolve) => {
      gpt2.resolve = resolve;
    });

    gpt2.onmessage = (e) => {
      log(e.data);
      if (e.data === "ready") {
        gpt2?.resolve?.(true);
      };
    };

    document.getElementsByTagName('button')?.[0]?.addEventListener?.('click', async () => {
      await gpt2.ready;
      gpt2.postMessage(document.getElementById('input').value);
    });
    document.getElementById('input')?.addEventListener?.('keydown', async (event) => {
      if (event.key === 'Enter') {
        await gpt2.ready;
        gpt2.postMessage(document.getElementById('input').value);
      }
    });
  </script>
</body>

</html>
